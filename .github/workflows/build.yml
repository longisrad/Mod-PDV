name: Build Padavan NEWIFI3

on:
  workflow_dispatch: # Cho phép nhấn nút chạy thủ công trên giao diện GitHub Actions
  push:
    branches:
      - master # Tự động chạy khi bạn push code lên nhánh master

jobs:
  build:
    runs-on: ubuntu-22.04 # Môi trường Ubuntu 22.04 ổn định
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Khởi tạo môi trường biên dịch
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
            cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
            pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget \
            libc6-dev-i386

      - name: Tải Toolchain tiền biên dịch (MIPSLE - Tìm kiếm tự động)
        run: |
          # Tìm vị trí thực tế của script tải toolchain trong kho nguồn
          find_toolchain=$(find . -name "dl_toolchain.sh" | head -n 1)
          if [ -n "$find_toolchain" ]; then
              toolchain_dir=$(dirname "$find_toolchain")
              echo "Đã tìm thấy thư mục Toolchain tại: $toolchain_dir"
              cd "$toolchain_dir"
              sh dl_toolchain.sh
          else
              echo "LỖI: Không tìm thấy file dl_toolchain.sh trong kho nguồn!"
              exit 1
          fi

      - name: Tiến hành dọn dẹp và Biên dịch ROM (Tìm kiếm tự động)
        run: |
          # Tìm vị trí thực tế của tệp biên dịch trong kho nguồn
          find_build_script=$(find . -name "build_firmware_modify" | head -n 1)
          if [ -n "$find_build_script" ]; then
              build_dir=$(dirname "$find_build_script")
              echo "Đã tìm thấy thư mục biên dịch tại: $build_dir"
              cd "$build_dir"
              
              # Sao chép cấu hình build.config từ thư mục gốc vào thư mục mẫu và cấu hình đích .config
              cp -f "$GITHUB_WORKSPACE/build.config" configs/templates/NEWIFI3.config
              cp -f "$GITHUB_WORKSPACE/build.config" .config
              
              ./clear_tree
              ./build_firmware_modify NEWIFI3
          else
              echo "LỖI: Không tìm thấy tệp biên dịch build_firmware_modify trong kho nguồn!"
              exit 1
          fi

      - name: Đóng gói và Upload Firmware lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Padavan_NEWIFI3_Firmware
          path: |
            **/images/*.trx
