name: Build firmware

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Config file (relative to trunk/configs/templates/)'
        required: true
        default: 'zyxel/kn-lite2.config'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev m4 bison gawk \
            git gettext libssl-dev xsltproc zip

      - name: Build
        run: |
          cp trunk/configs/templates/${{ github.event.inputs.config }} trunk/.config
          cd trunk
          ./clear_tree.sh
          make

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: padavan-firmware
          path: trunk/images/*.trx
          if-no-files-found: warn
